<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E8B84B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a6b48;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F4A31;stop-opacity:1" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Base Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>
  
  <!-- Subtle Geometric Layer -->
  <g opacity="0.15" fill="none" stroke="#E8B84B" stroke-width="2" transform="translate(256 256)">
    <rect x="-200" y="-200" width="400" height="400" rx="40" transform="rotate(15)"/>
    <rect x="-200" y="-200" width="400" height="400" rx="40" transform="rotate(45)"/>
    <rect x="-200" y="-200" width="400" height="400" rx="40" transform="rotate(75)"/>
  </g>
  
  <!-- Mosque & Crescent Composition -->
  <g filter="url(#shadow)">
    <!-- Crescent Moon -->
    <path d="M220,100 A140,140 0 1,0 220,412 A120,120 0 1,1 220,100" fill="url(#goldGrad)" />
    
    <!-- Mosque Silhouette -->
    <g transform="translate(270 240)" fill="url(#goldGrad)">
      <!-- Central Dome -->
      <path d="M-50,60 A50,60 0 0,1 50,60 L50,100 L-50,100 Z" />
      <!-- Left Minaret -->
      <rect x="-75" y="20" width="12" height="80" />
      <path d="M-75,20 L-69,5 L-63,20 Z" />
      <!-- Right Minaret -->
      <rect x="63" y="20" width="12" height="80" />
      <path d="M63,20 L69,5 L75,20 Z" />
      <!-- Base Building -->
      <rect x="-90" y="100" width="180" height="40" rx="4" />
    </g>
  </g>
  
  <!-- Ornamental Frame -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="none" stroke="url(#goldGrad)" stroke-width="8" opacity="0.2"/>
</svg>
